<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ИИшница — приватный клуб</title>
    <meta name="description" content="Закрытый клуб про путь из стройки в ИИ." />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #E9F2FB; color: #1A2238; font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
      #boot { padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
      #boot .title { font-size: 26px; font-weight: 700; }
      #boot .hint { font-size: 13px; color: #5A7090; text-align: center; max-width: 280px; }
      #boot .spinner { width: 32px; height: 32px; border: 3px solid rgba(45,91,150,0.12); border-top-color: #2D5B96; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="spinner"></div>
        <div class="title">ИИшница</div>
        <div class="hint">Загружаем клуб…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
