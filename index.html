<!doctype html>
<html lang="ru" class="tg-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060709" />
    <title>ИИшница — приватный клуб</title>
    <meta name="description" content="Закрытый клуб про путь из стройки в ИИ." />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #060709; color: #E8DFC8; font-family: 'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
      #boot { padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 18px; }
      #boot .title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 34px; font-weight: 800; letter-spacing: -0.025em; color: #E5B247; }
      #boot .hint { font-size: 11px; color: #7D7A6F; text-align: center; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; }
      #boot .spinner { width: 28px; height: 28px; border: 1px solid rgba(229,178,71,0.18); border-top-color: #E5B247; border-radius: 50%; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="spinner"></div>
        <div class="title">ИИшница</div>
        <div class="hint">приватный клуб</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
